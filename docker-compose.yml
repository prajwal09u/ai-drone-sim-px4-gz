services:
  px4:
    image: px4io/px4-dev-simulation:latest
    container_name: ai-drone-px4
    environment:
      # Headless by default (macOS friendly)
      - PX4_SIM_MODEL=gz_x500
      - GZ_HEADLESS_RENDERING=1
      - QT_QPA_PLATFORM=offscreen
    volumes:
      - ./worlds:/workspace/worlds:rw
    working_dir: /workspace/PX4-Autopilot
    command: bash -lc "make px4_sitl gz_x500"
    network_mode: host

  ros:
    image: ros:humble
    container_name: ai-drone-ros
    depends_on:
      - px4
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./ros2_ws:/ros2_ws:rw
    network_mode: host
    command: bash -lc "apt-get update && apt-get install -y python3-pip python3-opencv ros-humble-cv-bridge && pip3 install pymavlink numpy && cd /ros2_ws && . /opt/ros/humble/setup.sh && colcon build && . install/setup.sh && ros2 launch ai_follower sim_follow.launch.py"
