vision_node:
  ros__parameters:
    image_topic: /camera/image_raw
    target_hsv_low: [0, 140, 80]
    target_hsv_high: [10, 255, 255]
    min_area: 300

follow_node:
  ros__parameters:
    mavlink_udp: udp:127.0.0.1:14540
    setpoint_rate_hz: 20.0
    k_yaw: 1.2
    k_fwd: 1.0
    k_z: 0.6
    target_area: 0.015
    max_vx: 2.0
    max_vz: 1.0
    max_yaw_rate: 1.2
